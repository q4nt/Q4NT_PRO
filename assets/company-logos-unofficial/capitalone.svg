<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Capital One app icon: wordmark + red swoosh on dark navy -->
  <rect width="64" height="64" rx="12" fill="#0B2240"/>

  <!-- Red swoosh arc curving over the text -->
  <path d="M14 30 C18 28, 24 17, 50 16" stroke="#D12027" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Thinner trailing swoosh tail -->
  <path d="M14 30 C16 29, 19 23, 28 20" stroke="#D12027" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- "Capital" text -->
  <text x="9" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="400" font-style="italic" fill="white" letter-spacing="0.3">Capital</text>

  <!-- "One" text -->
  <text x="40.5" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="700" font-style="italic" fill="white" letter-spacing="0.3">One</text>

  <!-- SM superscript -->
  <text x="55" y="35" font-family="Arial, sans-serif" font-size="3.5" fill="white" opacity="0.7">SM</text>
</svg>
