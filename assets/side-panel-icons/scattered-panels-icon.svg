<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50">
  <defs>
    <filter id="s1" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.5" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="s2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.8" flood-color="#000" flood-opacity="0.14"/>
    </filter>
    <filter id="s3" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="s4" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.5" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <filter id="s5" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.8" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Panel 1 - Furthest back (darkest, top-right) -->
  <rect x="28" y="5" width="15" height="10" rx="1.5" fill="#888888" filter="url(#s1)"/>

  <!-- Panel 2 - Back-mid (left, mid) -->
  <rect x="4" y="14" width="16" height="11" rx="1.5" fill="#a0a0a0" filter="url(#s2)"/>

  <!-- Panel 3 - Middle (center-right, lower) -->
  <rect x="27" y="25" width="17" height="11" rx="1.8" fill="#b8b8b8" filter="url(#s3)"/>

  <!-- Panel 4 - Front-mid (left-center, bottom) -->
  <rect x="8" y="31" width="17" height="12" rx="1.8" fill="#d0d0d0" filter="url(#s4)"/>

  <!-- Panel 5 - Closest (lightest, center) -->
  <rect x="15" y="15" width="19" height="13" rx="2" fill="#eeeeee" filter="url(#s5)"/>
</svg>
