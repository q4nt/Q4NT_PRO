<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Q4NT PRO - Advanced 3D Workspace with Beveled Panels and Multi-View Layouts">
    <title>Q4NT PRO - 3D Workspace</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <!-- SVG Definitions -->
    <svg width="0" height="0" style="position: absolute; width: 0; height: 0; overflow: hidden;">
        <defs>
            <linearGradient id="ai-blue-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#007AFF" />
                <stop offset="100%" stop-color="#5ac8fa" />
            </linearGradient>
        </defs>
    </svg>

<div id="canvas-container"></div>

<div id="ui-container">
    <!-- Grid Layout Container -->
    <div id="workspace-grid" class="workspace-grid layout-single">
        <div class="workspace-pane"></div>
    </div>

    <!-- AI Gradient Edge Panels -->
    <div class="ai-edge-panel ai-edge-left">
        <div class="vertical-tools" style="justify-content: flex-start; padding-top: 15px;">
            <!-- Dashboard -->
            <div class="vertical-icon dashboard-icon" title="Dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                    <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                </svg>
            </div>
            <!-- Navigate -->
            <div class="vertical-icon" title="Navigate">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#ai-blue-gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                </svg>
            </div>
            <!-- Folder -->
            <div class="vertical-icon" title="Folder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <!-- World -->
            <div class="vertical-icon" title="World">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
            </div>
        </div>
        <!-- Bottom Profile -->
        <div class="left-bottom-tools">
            <!-- Alert -->
            <button class="edge-btn right-alert-btn" title="Alerts">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </button>
            <button class="jj-profile-btn" title="Profile">JJ</button>
        </div>
    </div>

    <!-- Workspace Logo -->
    <div class="logo-text">Q4NT</div>

    <div class="ai-edge-panel ai-edge-right">
        <!-- Top Icons -->
        <div class="right-top-tools">
            <!-- Plus -->
            <button class="edge-btn right-plus-btn" title="Add New">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#ai-blue-gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <!-- OpenAI -->
            <button class="edge-btn right-openai-btn" title="OpenAI">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.998 5.998 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/>
                </svg>
            </button>
            <!-- Polymarket -->
            <button class="edge-btn right-polymarket-btn" title="Polymarket">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
            </button>
        </div>
        <!-- Bottom Icons -->
        <div class="right-bottom-tools">
            <!-- Store -->
            <button class="edge-btn right-store-btn" title="Store">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
            </button>
            <!-- Theme Toggle -->
            <button class="edge-btn theme-toggle-btn" title="Toggle Theme">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <!-- Layout Options -->
            <button class="edge-btn grid-layout-btn" title="Layout Options">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                    <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                </svg>
            </button>
            <!-- Share -->
            <button class="edge-btn right-share-btn" title="Share">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
            </button>
        </div>
    </div>

    <!-- Invisible trigger areas -->
    <div class="edge-trigger trigger-top"></div>

    <!-- Top Nav Buttons -->
    <div class="top-nav-buttons">
        <button class="nav-btn">1</button>
        <button class="nav-btn">2</button>
        <button class="nav-btn">3</button>
        <button class="nav-btn">4</button>
        <button class="nav-btn">5</button>
        <button class="nav-btn">6</button>
        <button class="nav-btn">7</button>
        <button class="nav-btn">8</button>
        <button class="nav-btn">9</button>
        <button class="nav-btn">10</button>
        <button class="nav-btn">11</button>
        <button class="nav-btn">12</button>
        <button class="nav-btn">13</button>
        <button class="nav-btn">14</button>
        <button class="nav-btn">15</button>
        <button class="nav-btn">16</button>
        <button class="nav-btn">17</button>
        <button class="nav-btn">18</button>
        <button class="nav-btn">19</button>
        <button class="nav-btn">20</button>
    </div>

    <!-- The Panels -->
    <div class="beveled-panel panel-top">
        <div class="panel-bg"></div>
        <button class="top-btn minus-btn" title="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <span class="panel-content">Top Panel</span>
        <button class="top-btn plus-btn" title="Add">
            <svg viewBox="0 0 24 24" fill="none" stroke="url(#ai-blue-gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <div class="beveled-panel panel-bottom floating" style="bottom: 24px;">
        <div class="cmd-drag-handle">
            <div class="cmd-drag-bar"></div>
        </div>
        <div class="panel-bg"></div>
        <div class="prompt-container">
            <textarea class="prompt-input" placeholder="Type a message..."></textarea>
            <div class="prompt-actions-left">
                <button class="prompt-btn mic-btn" title="Voice Input">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <button class="prompt-btn community-btn" title="Community" style="position: relative;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span style="position: absolute; bottom: -4px; right: -4px; background: #ff3b30; color: white; border-radius: 50%; font-size: 9px; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1.5px solid var(--current-bg, #fff);">3</span>
                </button>
                <button class="prompt-btn layout-btn" title="Toolbar Split Button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <!-- Left half background -->
                        <path class="layout-bg-left" d="M3 5 a 2 2 0 0 1 2 -2 h 7 v 18 h -7 a 2 2 0 0 1 -2 -2 Z" fill="transparent" stroke="none"></path>
                        <!-- Right half background -->
                        <path class="layout-bg-right" d="M12 3 h 7 a 2 2 0 0 1 2 2 v 14 a 2 2 0 0 1 -2 2 h -7 Z" fill="transparent" stroke="none"></path>
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="12" y1="3" x2="12" y2="21"></line>
                    </svg>
                </button>
            </div>
            <div class="prompt-actions">
                <button class="prompt-btn attach-btn" title="Attach File">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                </button>
                <button class="prompt-btn send-btn" title="Send Message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="beveled-panel toolbar-left">
        <div class="panel-bg"></div>
        <div class="vertical-tools" style="justify-content: flex-start; padding-top: 15px; opacity: 0; pointer-events: none;">
            <!-- Icons removed from toolbar, moved to edge panel -->
        </div>
        <div class="hud-dial-container">
            <svg class="hud-svg" viewBox="0 0 50 200">
                <g class="interactive-dial">
                    <!-- Vertical Track -->
                    <line x1="25" y1="10" x2="25" y2="190" stroke="rgba(0, 0, 0, 0.15)" stroke-width="4" stroke-linecap="round" />
                    <!-- Major Ticks -->
                    <line x1="18" y1="10" x2="25" y2="10" stroke="rgba(0, 0, 0, 0.5)" stroke-width="2" />
                    <line x1="18" y1="55" x2="25" y2="55" stroke="rgba(0, 0, 0, 0.5)" stroke-width="2" />
                    <line x1="18" y1="100" x2="25" y2="100" stroke="rgba(0, 0, 0, 0.5)" stroke-width="2" />
                    <line x1="18" y1="145" x2="25" y2="145" stroke="rgba(0, 0, 0, 0.5)" stroke-width="2" />
                    <line x1="18" y1="190" x2="25" y2="190" stroke="rgba(0, 0, 0, 0.5)" stroke-width="2" />
                    <!-- Minor Ticks -->
                    <line x1="22" y1="32.5" x2="25" y2="32.5" stroke="rgba(0, 0, 0, 0.25)" stroke-width="1" />
                    <line x1="22" y1="77.5" x2="25" y2="77.5" stroke="rgba(0, 0, 0, 0.25)" stroke-width="1" />
                    <line x1="22" y1="122.5" x2="25" y2="122.5" stroke="rgba(0, 0, 0, 0.25)" stroke-width="1" />
                    <line x1="22" y1="167.5" x2="25" y2="167.5" stroke="rgba(0, 0, 0, 0.25)" stroke-width="1" />
                    <!-- Values -->
                    <text x="14" y="14" fill="#333333" font-size="10" font-weight="600" text-anchor="end" font-family="'Inter', sans-serif">100</text>
                    <text x="14" y="104" fill="#333333" font-size="10" font-weight="600" text-anchor="end" font-family="'Inter', sans-serif">50</text>
                    <text x="14" y="194" fill="#333333" font-size="10" font-weight="600" text-anchor="end" font-family="'Inter', sans-serif">0</text>
                </g>
                <!-- Alignment indicator -->
                <polygon points="35,95 40,100 35,105" fill="#007AFF" />
                <line x1="35" y1="100" x2="25" y2="100" stroke="#007AFF" stroke-width="2" />
            </svg>
        </div>
        <span class="panel-content">Left Toolbar</span>
    </div>

    <div class="beveled-panel toolbar-right">
        <div class="panel-bg"></div>
        <div class="vertical-tools">
            <div class="vertical-icon" title="Diagonal Line">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="19" x2="19" y2="5"></line>
                </svg>
            </div>
            <div class="vertical-icon" title="Rectangle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                </svg>
            </div>
            <div class="vertical-icon" title="Textbox">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="4 7 4 4 20 4 20 7"></polyline>
                    <line x1="9" y1="20" x2="15" y2="20"></line>
                    <line x1="12" y1="4" x2="12" y2="20"></line>
                </svg>
            </div>
            <div class="vertical-icon" title="Percent">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="5" x2="5" y2="19"></line>
                    <circle cx="6.5" cy="6.5" r="2.5"></circle>
                    <circle cx="17.5" cy="17.5" r="2.5"></circle>
                </svg>
            </div>
            <div class="vertical-icon" title="Scissors">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="6" cy="6" r="3"></circle>
                    <circle cx="6" cy="18" r="3"></circle>
                    <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
                    <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
                    <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
                </svg>
            </div>
        </div>
        <span class="panel-content">Right Toolbar</span>
    </div>

    <div class="theme-options-panel">
        <div class="theme-grid-container">
            <div class="theme-option dark" data-theme="dark">Dark</div>
            <div class="theme-option light" data-theme="light">Light</div>
            <div class="theme-option blue" data-theme="blue">Ocean</div>
            <div class="theme-option green" data-theme="green">Forest</div>
        </div>
    </div>

    <div class="layout-options-panel">
        <div class="layout-grid-container">
            <div class="layout-option" title="Single View" data-layout="single" data-panes="0">
                <div class="lo-box"></div>
            </div>
            <div class="layout-option lo-vertical" title="Horizontal Split" data-layout="horizontal" data-panes="2">
                <div class="lo-box"></div>
                <div class="lo-box"></div>
            </div>
            <div class="layout-option lo-horizontal" title="Vertical Split" data-layout="vertical" data-panes="2">
                <div class="lo-box"></div>
                <div class="lo-box"></div>
            </div>
            <div class="layout-option lo-quad" title="Quad View" data-layout="quad" data-panes="4">
                <div class="lo-box"></div><div class="lo-box"></div>
                <div class="lo-box"></div><div class="lo-box"></div>
            </div>
            <div class="layout-option lo-horizontal" title="Left Sidebar" data-layout="left-sidebar" data-panes="2">
                <div class="lo-box" style="flex: 1;"></div>
                <div class="lo-box" style="flex: 2;"></div>
            </div>
            <div class="layout-option lo-horizontal" title="Right Sidebar" data-layout="right-sidebar" data-panes="2">
                <div class="lo-box" style="flex: 2;"></div>
                <div class="lo-box" style="flex: 1;"></div>
            </div>
        </div>
    </div>
</div>

<!-- Floating Vertical Panel -->
<div class="float-panel" id="float-panel" style="display: none;">
    <div class="float-panel-header" id="float-panel-header">
        <span class="float-panel-title">Panel</span>
        <button class="float-panel-close" id="float-panel-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="line">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>
    <div class="float-panel-body">
        <!-- Panel content can go here -->
    </div>
    <!-- Resize handles -->
    <div class="float-panel-resize fp-res-r"  data-dir="r"></div>
    <div class="float-panel-resize fp-res-b"  data-dir="b"></div>
    <div class="float-panel-resize fp-res-br" data-dir="br"></div>
    <div class="float-panel-resize fp-res-bl" data-dir="bl"></div>

<!-- Bottom Tab Panel -->
<div class="bottom-tab-panel" id="bottom-tab-panel">
    <div class="btp-resize-bar" id="btp-resize-bar"></div>
    <div class="btp-tab-strip">
        <button class="btp-tab active" data-tab="watchlist">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
            Watchlist
        </button>
        <button class="btp-tab" data-tab="console">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            Console
        </button>
        <button class="btp-tab" data-tab="output">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            Output
        </button>
        <button class="btp-tab" data-tab="telemetry">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            Telemetry
        </button>
        <button class="btp-tab" data-tab="camera">
